  <header>Header Section (wg99)</header>

  <!-- Button Navigation -->
  <nav class="carousel-buttons">
    <button id="prevBtn">Previous</button>
    <button id="nextBtn">Next</button>
  </nav>

  <!-- Carousel Content -->
  <div class="carousel">
    <div class="carousel-container">
      <div class="panel">Panel 1: HTML Forms</div>
      <div class="panel">Panel 2: CSS Grid</div>
      <div class="panel">Panel 3: JavaScript Events</div>
      <div class="panel">Panel 4: Responsive Design</div>
      <div class="panel">Panel 5: Accessibility Best Practices</div>
    </div>
  </div>

<script src="util.js"></script>

<!-- JS: Carousel Logic -->
<script>
  // UCID: wg99 | Date: 2025-06-16
  const panels = document.querySelectorAll('.panel');
  let currentIndex = 0;

  function updateCarousel() {
    panels.forEach((panel, index) => {
      panel.style.display = index === currentIndex ? 'block' : 'none';
    });
  }

  document.getElementById('prevBtn').addEventListener('click', () => {
    currentIndex = (currentIndex - 1 + panels.length) % panels.length;
    updateCarousel();
  });

  document.getElementById('nextBtn').addEventListener('click', () => {
    currentIndex = (currentIndex + 1) % panels.length;
    updateCarousel();
  });

  updateCarousel();

</script>

<!-- CSS Styles -->
<style>
  /* UCID: wg99 | Date: 2025-06-16 */

</style>
